namespace:    "llm-gateway"
owner:        "jarethrader@gmail.com"
app:
  name:         "gateway"
  version:      "1.0.0"
  addr:         "localhost"
  port:         ":8848"
  log_level:    DEBUG
  environment:  DEV

shutdown_wait_sec: 30

telemetry:
  enabled: true
  endpoint: localhost:4317
  insecure: true
  sample_ratio: 1.0

auth:
  mode: static # static | dynamic
  key_table_path: ./secrets/keys.json
  api_url: http://localhost:9000
  interval: 60s

connection_pool:
  dial_timeout: 2s
  tcp_keep_alive: 30s
  max_idle_conns: 512
  max_idle_conns_per_host: 64
  max_conns_per_host: 0
  idle_conn_timeout: 90s
  tls_handshake_timeout: 3s
  write_buffer_size: 65536
  read_buffer_size: 65536
  h2_read_idle_timeout: 15s
  h2_ping_timeout: 5s

sse_streaming:
  idle_timeout: 30s
  heartbeat_interval: 5s
  frame_aware: true
  flush_every_write: true
  max_body_bytes: 4194304

load_balancer:
  weights:
    latency: 1.0
    in_flight: 0.5
    cache: 0.8
    ref_ttft_ms: 200
  ewma_alpha: 0.2
  max_in_flight_per_backend: 256
  scrape:
    enabled: true
    interval: 2s
    timeout: 1s
    cache_ttl: 1s

backend_discovery:
  mode: static # static | dynamic | endpointslice
  # For dynamic mode
  api_url: http://localhost:9000
  interval: 60s
  # For static mode
  backends:
    - id: fakevllm
      base_url: http://127.0.0.1:11434
      protocol: h1
      models:
        - m
      weight: 1.0