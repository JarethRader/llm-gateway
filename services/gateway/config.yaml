namespace:    "llm-gateway"
owner:        "jarethrader@gmail.com"
app:
  name:         "gateway"
  version:      "1.0.0"
  addr:         "localhost"
  port:         ":8848"
  log_level:    DEBUG
  environment:  DEV

telemetry:
  enabled: true
  endpoint: localhost:4317
  insecure: true
  sample_ratio: 1.0

connection_pool:
  dial_timeout: 2s
  tcp_keep_alive: 30s
  max_idle_conns: 512
  max_idle_conns_per_host: 64
  max_conns_per_host: 0
  idle_conn_timeout: 90s
  tls_handshake_timeout: 3s
  write_buffer_size: 65536
  read_buffer_size: 65536
  h2_read_idle_timeout: 15s
  h2_ping_timeout: 5s

sse_streaming:
  idle_timeout: 30s
  heartbeat_interval: 5s
  frame_aware: true
  flush_every_write: true
  max_body_bytes: 4194304