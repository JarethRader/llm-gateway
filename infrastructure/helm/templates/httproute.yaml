{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "llm-gateway.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.gateway.gateway }}
      {{- if .Values.gateway.gateway.namespace }}
      namespace: {{ .Values.gateway.gateway.namespace }}
      {{- end }}
      sectionName: {{ .Values.gateway.gateway.sectionName }}
  rules:
    {{- range .Values.gateway.paths }}
    - matches:
        - path:
            type: {{ .pathType }}
            value: {{ .path }}
      backendRefs:
        - name: {{ include "llm-gateway.name" $ }}-service
          port: {{ $.Values.service.port }}
    {{- end }}
  {{- if .Values.gateway.hosts }}
  hostnames:
    {{- range .Values.gateway.hosts }}
    - {{ .hostname }}
    {{- end }}
  {{- end }}
{{- end }}
