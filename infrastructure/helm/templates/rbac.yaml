{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "llm-gateway.fullname" . }}-config-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
rules:
{{- range .Values.rbac.configMapNames }}
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch", "list"]
    resourceNames: [{{ . }}]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "llm-gateway.fullname" . }}-config-reader
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "llm-gateway.fullname" . }}-config-reader
subjects:
- kind: ServiceAccount
  name: {{ include "llm-gateway.name" . }}-svc-sa
  namespace: {{ .Release.Namespace }}
{{- end }}
