apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-gateway.name" . }}-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "llm-gateway.labels" . | nindent 4 }}
  annotations:
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml" ) . | sha256sum }}
  {{- if and (not .Values.secret.existingSecret) .Values.secret.data }}
    checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml" ) . | sha256sum }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "llm-gateway.fullname" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "llm-gateway.fullname" . }}
        {{- include "llm-gateway.selectorLabels" . | nindent 8 }}
      {{- with .Values.deployment.annotations }}
      annotations:
        {{- toYaml . | nindent 4 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "llm-gateway.name" . }}-svc-sa
      automountServiceAccountToken: false
      securityContext: {{- toYaml .Values.securityContext.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ include "llm-gateway.name" . }}-llm-gateway
        image: {{ include "llm-gateway.image" . }}
        securityContext: {{- toYaml .Values.securityContext.securityContext | nindent 10 }}
        ports:
        - name: http
          containerPort: 8848
        env:
        - name: K8S_POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        {{- with .Values.resources}}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        livenessProbe:
          httpGet:
            path: /livez
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /startupz
            port: http
          failureThreshold: 30
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /config.yaml
          subPath: config.yaml
        {{- if or .Values.secret.existingSecret .Values.secret.data }}
        - name: secret
          mountPath: /secrets
          readOnly: true
        {{- end }}
      volumes:
      - name: config
        configMap:
          name: {{ include "llm-gateway.name" . }}-configmap
          items:
          - key: config.yaml
            path: config.yaml
      {{- if or .Values.secret.existingSecret .Values.secret.data }}
      - name: secret
        secret:
          secretName: {{ .Values.secret.existingSecret | default (printf "%s-secret" (include "llm-gateway.fullname" .)) }}
      {{- end }}
