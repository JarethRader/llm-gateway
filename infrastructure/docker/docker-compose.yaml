name: llm-gateway-local

services:
  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8080:8080"
    volumes:
      - libsql-data:/var/lib/libsql
    environment:
      - LIBSQL_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-a1b2c3d4}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - llm-gateway
    restart: unless-stopped
  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - 16686:16686 # Jaeger UI
      - 14268:14268 # Collector gRPC
      - 14250:14250 # Collector HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - MEMORY_MAX_TRACES=50000
      - QUERY_BASE_PATH=/jaeger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16686/jaeger/api/service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - llm-gateway
    restart: unless-stopped
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    ports:
      - 4317:4317 # OTLP gRPC
      - 4318:4318 # OTLP HTTP
      - 8889:8889 # Prometheus metrics
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    command:
      - --config=/etc/otel-collector-config.yaml
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http;//localhost:8898/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - llm-gateway
    restart: unless-stopped

networks:
  llm-gateway:
    name: llm-gateway
    driver: bridge

volumes:
  libsql-data:
    name: llm-gateway-libsql-data